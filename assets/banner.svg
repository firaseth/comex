<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06060B"/>
      <stop offset="100%" stop-color="#0B0B14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E89D"/>
      <stop offset="100%" stop-color="#00B87D"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EDEDF4"/>
      <stop offset="60%" stop-color="#00E89D"/>
      <stop offset="100%" stop-color="#EDEDF4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(500,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(700,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(800,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(1000,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00E89D" stroke-width="1" transform="translate(1100,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00E89D" stroke-width="1" transform="translate(0,100)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00E89D" stroke-width="1" transform="translate(0,200)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00E89D" stroke-width="1" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00E89D" stroke-width="1" transform="translate(0,400)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00E89D" stroke-width="1" transform="translate(0,500)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#00E89D" stroke-width="1" transform="translate(0,600)"/>
  </g>
  <!-- Glow -->
  <circle cx="350" cy="320" r="250" fill="#00E89D" opacity="0.04"/>
  <!-- Particles -->
  <circle cx="180" cy="140" r="2.5" fill="#00E89D" opacity="0.5"/>
  <circle cx="950" cy="100" r="2" fill="#00E89D" opacity="0.4"/>
  <circle cx="1050" cy="250" r="3" fill="#00E89D" opacity="0.3"/>
  <circle cx="150" cy="480" r="2" fill="#00E89D" opacity="0.45"/>
  <circle cx="800" cy="520" r="2.5" fill="#00E89D" opacity="0.35"/>
  <circle cx="1100" cy="450" r="1.8" fill="#00E89D" opacity="0.5"/>
  <circle cx="500" cy="80" r="2" fill="#FFD166" opacity="0.4"/>
  <circle cx="700" cy="560" r="2.2" fill="#74B9FF" opacity="0.35"/>
  <circle cx="300" cy="550" r="1.5" fill="#FF6B81" opacity="0.4"/>
  <!-- Lines -->
  <line x1="180" y1="140" x2="500" y2="80" stroke="#00E89D" stroke-width="0.5" opacity="0.06"/>
  <line x1="950" y1="100" x2="1050" y2="250" stroke="#00E89D" stroke-width="0.5" opacity="0.06"/>
  <line x1="800" y1="520" x2="1100" y2="450" stroke="#00E89D" stroke-width="0.5" opacity="0.06"/>
  <line x1="150" y1="480" x2="300" y2="550" stroke="#00E89D" stroke-width="0.5" opacity="0.06"/>
  <!-- Giant X -->
  <text x="920" y="440" font-family="system-ui, sans-serif" font-size="280" font-weight="800" fill="none" stroke="#00E89D" stroke-width="1" opacity="0.05">X</text>
  <!-- Main text -->
  <text x="100" y="260" font-family="system-ui, sans-serif" font-size="120" font-weight="800" fill="url(#textGrad)" letter-spacing="-4">comex</text>
  <text x="540" y="260" font-family="system-ui, sans-serif" font-size="120" font-weight="800" fill="#00E89D">.</text>
  <!-- Subtitle -->
  <text x="102" y="310" font-family="system-ui, sans-serif" font-size="22" font-weight="500" fill="#6E6E96" letter-spacing="1">Creative Development Studio</text>
  <!-- Tagline -->
  <text x="102" y="360" font-family="system-ui, sans-serif" font-size="16" fill="#44446A">Crafting immersive digital experiences through code, design, and motion.</text>
  <!-- Bottom badges -->
  <rect x="102" y="420" width="90" height="28" rx="6" fill="none" stroke="#1E1E36" stroke-width="1"/>
  <text x="147" y="439" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#00E89D" text-anchor="middle">HTML5</text>
  <rect x="202" y="420" width="70" height="28" rx="6" fill="none" stroke="#1E1E36" stroke-width="1"/>
  <text x="237" y="439" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#00E89D" text-anchor="middle">CSS3</text>
  <rect x="282" y="420" width="100" height="28" rx="6" fill="none" stroke="#1E1E36" stroke-width="1"/>
  <text x="332" y="439" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#00E89D" text-anchor="middle">JavaScript</text>
  <rect x="392" y="420" width="80" height="28" rx="6" fill="none" stroke="#1E1E36" stroke-width="1"/>
  <text x="432" y="439" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#00E89D" text-anchor="middle">Zero Deps</text>
  <!-- Bottom right -->
  <text x="1098" y="590" font-family="system-ui, sans-serif" font-size="12" fill="#333350" text-anchor="end">github.com/firaseth/comex-portfolio</text>
</svg>
